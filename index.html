  <link rel="stylesheet" href="style.css">
  <style>
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 8rem 2rem 4rem; }
    .hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr auto; gap: 3rem; align-items: center; }
    .hero-text { min-width: 0; }
    .greeting { font-family: var(--font-sans); font-size: clamp(4rem, 12vw, 10rem); font-weight: 700; line-height: 1; letter-spacing: -0.03em; margin-bottom: 1.5rem; opacity: 0; transform: translateY(40px); animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    .hero-subtitle { font-family: var(--font-serif); font-size: clamp(1.25rem, 3vw, 2rem); font-weight: 300; color: var(--text-secondary); margin-bottom: 1rem; opacity: 0; transform: translateY(40px); animation: fadeUp 1s 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    .hero-subtitle::before { content: '—'; margin-right: 0.75rem; color: var(--accent); }
    .hero-tagline { font-family: var(--font-sans); font-size: 1rem; font-weight: 400; letter-spacing: 0.05em; color: var(--text-secondary); opacity: 0; transform: translateY(40px); animation: fadeUp 1s 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    .hero-tree { opacity: 0; transform: translateY(40px); animation: fadeUp 1s 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; flex-shrink: 0; position: relative; overflow: hidden; }
    .hero-tree svg { width: clamp(200px, 30vw, 320px); height: auto; display: block; }
    /* Falling leaves */
    .leaf { position: absolute; width: 4px; height: 6px; background: #1a1a1a; border-radius: 60% 40% 50% 0; opacity: 0; pointer-events: none; animation: leafFall var(--d) var(--del) infinite linear; top: -10px; left: var(--x); }
    @keyframes leafFall {
      0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
      8%   { opacity: 0.55; }
      85%  { opacity: 0.2; }
      100% { transform: translateY(480px) rotate(var(--sp)) translateX(var(--dr)); opacity: 0; }
    }
    .hero-links { margin-top: 3rem; opacity: 0; transform: translateY(40px); animation: fadeUp 1s 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; grid-column: 1 / -1; }
    .tel-copy { cursor: pointer; position: relative; transition: color 0.2s; }
    .tel-copy:hover { color: var(--accent); }
    .tel-copy.copied::after { content: '已复制'; position: relative; left: 0; top: -1.4em; font-size: 0.75rem; color: var(--accent); white-space: nowrap; }
    @media (max-width: 768px) {
      .hero { padding: 10rem 1.5rem 3rem; }
      .hero-inner { grid-template-columns: 1fr; gap: 1.5rem; }
      .hero-tree { order: -1; margin: 0 auto; }
      .hero-tree svg { width: 180px; }
      .hero-links { margin-top: 2rem; }
    }
  </style>
